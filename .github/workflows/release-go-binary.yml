name: Release Go Binary

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Semantic version (e.g., 1.0.0-alpha.3 or v1.0.0-alpha.3)'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-go-binary-${{ github.event.inputs.version }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Normalize release tag
        id: version
        shell: bash
        run: |
          raw='${{ github.event.inputs.version }}'
          raw="${raw#refs/tags/}"

          if [[ "$raw" != v* ]]; then
            raw="v$raw"
          fi

          if [[ ! "$raw" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid semantic version tag: $raw" >&2
            exit 1
          fi

          echo "tag=$raw" >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Validate source version matches release tag
        shell: bash
        run: |
          tag='${{ steps.version.outputs.tag }}'
          current_version=$(perl -n -e 'print "$1\n" if /var Version = "([^"]+)"/' internal/version/version.go)

          if [[ -z "$current_version" ]]; then
            echo "Failed to read version from internal/version/version.go" >&2
            exit 1
          fi

          if [[ "$current_version" != "$tag" ]]; then
            echo "Release tag ${tag} does not match internal/version/version.go (${current_version})." >&2
            echo "Create and merge a version bump PR before running the release workflow." >&2
            exit 1
          fi

          echo "Validated source version ${current_version}"

      - name: Create git tag
        run: |
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
