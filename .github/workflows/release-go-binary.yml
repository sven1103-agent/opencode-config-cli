name: Release Go Binary

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Semantic version (e.g., v0.1.0-alpha.1)'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-go-binary-${{ github.event.inputs.version }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Create git tag
        run: |
          git tag -f ${{ github.event.inputs.version }}
          git push origin ${{ github.event.inputs.version }} --force

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --clean --skip=publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Release Assets
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd dist
          for file in opencode-helper_*.tar.gz opencode-helper_*.zip opencode-helper_*-checksums.txt; do
            if [ -f "$file" ]; then
              gh release upload "${{ github.event.inputs.version }}" "$file" --clobber
            fi
          done
