name: Release opencode-helper

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-opencode-helper-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build release bundle artifacts
        run: |
          mkdir -p release-assets
          BUNDLE_OUTPUT=$(sh scripts/release/build-opencode-helper-bundle.sh \
            --tag "${GITHUB_REF_NAME}" \
            --commit-sha "${GITHUB_SHA}" \
            --output-dir release-assets)
          echo "BUNDLE_TARBALL=$(echo "$BUNDLE_OUTPUT" | sed -n '1p')" >> "$GITHUB_ENV"
          echo "BUNDLE_MANIFEST=$(echo "$BUNDLE_OUTPUT" | sed -n '2p')" >> "$GITHUB_ENV"
          echo "BUNDLE_CHECKSUMS=$(echo "$BUNDLE_OUTPUT" | sed -n '3p')" >> "$GITHUB_ENV"
          echo "BUNDLE_INSTALLER=$(echo "$BUNDLE_OUTPUT" | sed -n '4p')" >> "$GITHUB_ENV"
          echo "BUNDLE_BOOTSTRAP=$(echo "$BUNDLE_OUTPUT" | sed -n '5p')" >> "$GITHUB_ENV"

      - name: Ensure release exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1 || \
          gh release create "${GITHUB_REF_NAME}" \
            --target "${GITHUB_SHA}" \
            --title "${GITHUB_REF_NAME}" \
            --notes "Automated release for ${GITHUB_REF_NAME}."

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            "${{ env.BUNDLE_TARBALL }}" \
            "${{ env.BUNDLE_MANIFEST }}" \
            "${{ env.BUNDLE_CHECKSUMS }}" \
            "${{ env.BUNDLE_INSTALLER }}" \
            "${{ env.BUNDLE_BOOTSTRAP }}" \
            --clobber
