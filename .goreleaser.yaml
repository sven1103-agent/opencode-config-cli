# .goreleaser.yaml
# GoReleaser configuration for opencode-helper
# https://goreleaser.com/introduction

version: 2

project_name: opencode-helper

before:
  hooks:
    - go mod tidy

builds:
  - id: opencode-helper
    binary: opencode-helper
    main: ./main.go
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/sven1103-agent/opencode-helper/internal/version.Version={{.Version}}

changelog:
  sort: desc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: sven1103-agent
    name: opencode-config-cli
  draft: false
  prerelease: auto
  name_template: "{{.Tag}}"

checksum:
  name_template: "{{.ProjectName}}-{{.Version}}-checksums.txt"
  algorithm: sha256

announce:
  twitter:
    enabled: false
